name: Data Refresh (OpenBB -> Supabase)

on:
  schedule:
    # 23:00 UTC = 20:00 America/Fortaleza
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  refresh-market-data:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_openbb.txt

      - name: Refresh, validate and upload
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not configured."
            exit 1
          fi
          python scripts/run_market_refresh.py
