name: Intraday Refresh (OpenBB -> Supabase)

on:
  schedule:
    # 13:05-20:35 UTC = 10:05-17:35 America/Fortaleza (segunda a sexta, intervalo de 30 min)
    - cron: "5,35 13-20 * * 1-5"
  workflow_dispatch: {}

jobs:
  refresh-intraday:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_openbb.txt

      - name: Refresh intraday
        run: |
          python scripts/intraday_refresh.py

      - name: Upload intraday artifact
        uses: actions/upload-artifact@v4
        with:
          name: intraday-latest
          path: output/intraday_latest.csv

      - name: Upload intraday to Supabase
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not configured."
            exit 1
          fi
          python scripts/upload_to_supabase.py --intraday-only
