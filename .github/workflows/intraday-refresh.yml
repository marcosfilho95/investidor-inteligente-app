name: Intraday Refresh (OpenBB -> Supabase)

on:
  schedule:
    # 12:37-20:07 UTC = 09:37-17:07 America/Fortaleza (segunda a sexta, intervalo de 15 min)
    - cron: "37,52 12 * * 1-5"
    - cron: "7,22,37,52 13-19 * * 1-5"
    - cron: "7 20 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: intraday-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-intraday:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements_openbb.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_openbb.txt

      - name: Refresh intraday
        run: |
          python scripts/intraday_refresh.py

      - name: Upload intraday artifact
        uses: actions/upload-artifact@v4
        with:
          name: intraday-latest
          path: output/intraday_latest.csv

      - name: Upload intraday to Supabase
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not configured."
            exit 1
          fi
          python scripts/upload_to_supabase.py --intraday-only
